<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedStart Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  display:flex;
  min-height:100vh;
  background:#0f172a;
  color:#fff;
}

.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
}

.logo{
  font-size:22px;
  font-weight:700;
  color:#38bdf8;
  margin-bottom:30px;
}

.sidebar a{
  display:block;
  padding:12px;
  margin-bottom:10px;
  color:#94a3b8;
  text-decoration:none;
  border-radius:10px;
  transition:0.3s;
}

.sidebar a:hover{
  background:#38bdf8;
  color:#020617;
}

.main{
  flex:1;
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-bottom:20px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.stat{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  text-align:center;
}

.stat h2{color:#38bdf8}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th,.table td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:left;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.delete{background:#ef4444;color:#fff}
.edit{background:#38bdf8;color:#020617}

@media(max-width:768px){
  .sidebar{display:none}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Admin</div>
  <a href="#">Дашборд</a>
  <a href="#">Пользователи</a>
  <a href="#">Вакансии</a>
  <a href="#">Компании</a>
</div>

<div class="main">
  <div class="header">
    <h1>Панель управления</h1>
    <button>Выйти</button>
  </div>

  <div class="stats">
    <div class="stat">
      <h2>500+</h2>
      <p>Пользователи</p>
    </div>
    <div class="stat">
      <h2>30+</h2>
      <p>Компании</p>
    </div>
    <div class="stat">
      <h2>80+</h2>
      <p>Трудоустройства</p>
    </div>
  </div>

  <div class="card">
    <h2>Последние пользователи</h2>
    <table class="table">
      <tr>
        <th>Имя</th>
        <th>Email</th>
        <th>Действия</th>
      </tr>
      <tr>
        <td>Иван Иванов</td>
        <td>ivan@mail.ru</td>
        <td>
          <button class="edit">Редактировать</button>
          <button class="delete">Удалить</button>
        </td>
      </tr>
      <tr>
        <td>Клиника №1</td>
        <td>clinic@mail.ru</td>
        <td>
          <button class="edit">Редактировать</button>
          <button class="delete">Удалить</button>
        </td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
