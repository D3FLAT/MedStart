<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#0f172a;color:#fff;height:100vh;display:flex}

.sidebar{
  width:280px;
  background:#020617;
  padding:15px;
  overflow-y:auto;
}

.chat-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
  background:#1e293b;
}

.chat-item.active{background:#38bdf8;color:#020617}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  border-bottom:1px solid #1e293b;
}

.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  border-radius:12px;
}

.me{background:#38bdf8;color:#020617;align-self:flex-end}
.other{background:#1e293b}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #1e293b;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:#fff;
}

button{
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  cursor:pointer;
}

@media(max-width:768px){
  .sidebar{display:none}
}
</style>
</head>
<body>

<div class="sidebar" id="chatList"></div>

<div class="main">
  <div class="header" id="chatHeader">Выберите чат</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input id="input" placeholder="Сообщение...">
    <button onclick="send()">→</button>
  </div>
</div>

<script>
const chats = [
  {
    name:'Поликлиника №3',
    messages:[
      {text:'Здравствуйте', me:false},
      {text:'Добрый день!', me:true}
    ]
  },
  {
    name:'Детская больница',
    messages:[
      {text:'Вы готовы выйти на стажировку?', me:false}
    ]
  }
];

let current = null;

function renderChats(){
  const list = document.getElementById('chatList');
  list.innerHTML='';

  chats.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className='chat-item';
    div.innerText = c.name;
    div.onclick = ()=>openChat(i);
    list.appendChild(div);
  });
}

function openChat(i){
  current = i;
  document.getElementById('chatHeader').innerText = chats[i].name;

  document.querySelectorAll('.chat-item').forEach((el,idx)=>{
    el.classList.toggle('active', idx===i);
  });

  renderMessages();
}

function renderMessages(){
  const container = document.getElementById('messages');
  container.innerHTML='';

  if(current===null) return;

  chats[current].messages.forEach(m=>{
    const div = document.createElement('div');
    div.className = 'msg ' + (m.me ? 'me':'other');
    div.innerText = m.text;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;
}

function send(){
  const input = document.getElementById('input');
  if(!input.value || current===null) return;

  chats[current].messages.push({text:input.value, me:true});
  input.value='';
  renderMessages();
}

renderChats();
</script>

</body>
</html>
