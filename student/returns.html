<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои отклики</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff}

.container{max-width:900px;margin:40px auto;padding:20px}

h1{margin-bottom:20px}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:16px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.info{display:flex;flex-direction:column}

.status{
padding:6px 12px;
border-radius:20px;
font-size:14px;
font-weight:600;
}

.pending{background:#facc15;color:#020617}
.accepted{background:#22c55e;color:#020617}
.rejected{background:#ef4444;color:#fff}

button{
margin-top:8px;
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#38bdf8;
color:#020617;
}

@media(max-width:600px){
.card{flex-direction:column;align-items:flex-start;gap:10px}
}
</style>
</head>
<body>

<div class="container">
<h1>Мои отклики</h1>

<div id="list"></div>

</div>

<script>
const responses = [
  {title:'Врач-терапевт', company:'Поликлиника №3', status:'pending'},
  {title:'Педиатр', company:'Детская больница', status:'accepted'},
  {title:'Медсестра', company:'Частная клиника', status:'rejected'}
];

function getStatusClass(status){
  if(status==='accepted') return 'accepted';
  if(status==='rejected') return 'rejected';
  return 'pending';
}

function getStatusText(status){
  if(status==='accepted') return 'Принято';
  if(status==='rejected') return 'Отклонено';
  return 'На рассмотрении';
}

function render(){
  const container = document.getElementById('list');
  container.innerHTML='';

  responses.forEach((r,i)=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <div class="info">
        <b>${r.title}</b>
        <span style="color:#94a3b8">${r.company}</span>
        <button onclick="view(${i})">Открыть вакансию</button>
      </div>
      <div class="status ${getStatusClass(r.status)}">
        ${getStatusText(r.status)}
      </div>
    `;

    container.appendChild(div);
  });
}

function view(i){
  alert('Открыть страницу вакансии');
}

render();
</script>

</body>
</html>
