<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог студентов</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff}

.container{max-width:1200px;margin:40px auto;padding:20px}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

.search{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:#fff;
  width:250px;
}

.layout{display:grid;grid-template-columns:250px 1fr;gap:20px}

.filters{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:16px;
}

.filters h3{margin-bottom:10px}
.filters input{margin-bottom:10px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:16px;
  transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.top{display:flex;gap:10px;align-items:center;margin-bottom:10px}

.avatar{
  width:50px;
  height:50px;
  border-radius:50%;
  background:#38bdf8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#020617;
}

.name{font-weight:600}
.spec{font-size:13px;color:#94a3b8}

.skills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{background:#1e293b;padding:4px 8px;border-radius:8px;font-size:12px}

.actions{margin-top:10px;display:flex;gap:10px}

button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.view{background:#38bdf8;color:#020617}
.invite{background:#22c55e;color:#020617}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <h1>Студенты</h1>
  <input class="search" placeholder="Поиск..." oninput="filter()">
</div>

<div class="layout">

<div class="filters">
  <h3>Фильтры</h3>
  <input placeholder="Специальность">
  <input placeholder="Город">
</div>

<div class="grid" id="list"></div>

</div>

</div>

<script>
const students = [
  {name:'Иван Иванов', spec:'Терапия', skills:['Коммуникация','Диагностика']},
  {name:'Анна Смирнова', spec:'Педиатрия', skills:['Работа с детьми']},
  {name:'Петр Сидоров', spec:'Хирургия', skills:['Ассистирование','Операции']}
];

function render(arr=students){
  const container = document.getElementById('list');
  container.innerHTML='';

  arr.forEach((s,i)=>{
    const div = document.createElement('div');
    div.className='card';

    div.innerHTML = `
      <div class="top">
        <div class="avatar">${s.name[0]}</div>
        <div>
          <div class="name">${s.name}</div>
          <div class="spec">${s.spec}</div>
        </div>
      </div>

      <div class="skills">
        ${s.skills.map(sk=>`<span class="tag">${sk}</span>`).join('')}
      </div>

      <div class="actions">
        <button class="view" onclick="view(${i})">Профиль</button>
        <button class="invite" onclick="invite(${i})">Пригласить</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function filter(){
  const q = document.querySelector('.search').value.toLowerCase();
  const filtered = students.filter(s=>
    s.name.toLowerCase().includes(q) ||
    s.spec.toLowerCase().includes(q)
  );
  render(filtered);
}

function view(i){
  alert('Открыть профиль студента');
}

function invite(i){
  alert('Приглашение отправлено');
}

render();
</script>

</body>
</html>
