<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль студента</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
}

h2{margin-bottom:15px}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:#fff;
}

textarea{resize:none;height:100px}

button{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:#020617;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{transform:scale(1.05)}

.profile-top{
  display:flex;
  gap:20px;
  align-items:center;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:#38bdf8;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
}

@media(max-width:600px){
  .profile-top{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Профиль студента</h1>
    <button onclick="save()">Сохранить</button>
  </div>

  <div class="card">
    <div class="profile-top">
      <div class="avatar" id="avatar">И</div>
      <div>
        <input id="name" type="text" placeholder="ФИО">
        <input id="speciality" type="text" placeholder="Специальность">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>О себе</h2>
    <textarea id="about" placeholder="Краткая информация"></textarea>
  </div>

  <div class="card" id="portfolioCard">
    <h2>Моё портфолио</h2>
    <div id="portfolioContent"></div>
    <button onclick="">Добавить новое</button>
  </div>

</div>

<script>
let skills = [];

function addSkill(){
  const input = document.getElementById('skillInput');
  if(input.value.trim()==='') return;

  skills.push(input.value);
  input.value='';
  renderSkills();
}

function renderSkills(){
  const container = document.getElementById('skills');
  container.innerHTML='';

  skills.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className='skill';
    el.innerText = s;
    el.onclick = ()=>{
      skills.splice(i,1);
      renderSkills();
    };
    container.appendChild(el);
  });
}

function save(){
  alert('Сохранено (демо)');
}

// аватар по первой букве
const nameInput = document.getElementById('name');
nameInput.addEventListener('input',()=>{
  const val = nameInput.value.trim();
  document.getElementById('avatar').innerText = val ? val[0].toUpperCase() : 'И';
});
</script>

</body>
</html>
