<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вакансия</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff}
.container{max-width:1100px;margin:40px auto;padding:20px}

.header{margin-bottom:30px}
.header h1{margin-bottom:10px}

.layout{display:grid;grid-template-columns:2fr 1fr;gap:20px}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:16px;
}

h2{margin-bottom:15px}

.apply-btn{
margin-top:15px;
background:#22c55e;
color:#020617;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.candidate{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.candidate-info{display:flex;flex-direction:column}

.actions button{
margin-left:5px;
padding:6px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.accept{background:#22c55e;color:#020617}
.reject{background:#ef4444;color:#fff}
.view{background:#38bdf8;color:#020617}

@media(max-width:900px){
.layout{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Врач-терапевт</h1>
<p style="color:#94a3b8">Астрахань • Поликлиника №3</p>
</div>

<div class="layout">

<div class="card">
<h2>Описание вакансии</h2>
<p>Ищем молодого специалиста для работы в поликлинике. Требуется базовая практика и желание развиваться.</p>

<h2 style="margin-top:20px">Требования</h2>
<ul style="color:#94a3b8">
<li>Медицинское образование</li>
<li>Коммуникабельность</li>
<li>Ответственность</li>
</ul>
</div>

<div class="card">
<h2>Отклики</h2>
<div id="responses"></div>
</div>

</div>

</div>

<script>
const candidates = [
  {name:'Иван Иванов', spec:'Терапия'},
  {name:'Анна Смирнова', spec:'Педиатрия'}
];

function render(){
  const container = document.getElementById('responses');
  container.innerHTML='';

  candidates.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className='candidate';

    div.innerHTML = `
      <div class="candidate-info">
        <b>${c.name}</b>
        <span style="color:#94a3b8">${c.spec}</span>
      </div>
      <div class="actions">
        <button class="view" onclick="view(${i})">Профиль</button>
        <button class="accept" onclick="accept(${i})">✔</button>
        <button class="reject" onclick="reject(${i})">✕</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function view(i){
  alert('Открыть профиль кандидата');
}

function accept(i){
  alert('Принят');
}

function reject(i){
  candidates.splice(i,1);
  render();
}

render();
</script>

</body>
</html>
